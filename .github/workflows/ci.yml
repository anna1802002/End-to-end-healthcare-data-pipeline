name: healthcare-pipeline-ci

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Syntax checks
        run: python -m compileall src scripts tests
      - name: Verify critical files exist
        run: |
          test -f src/pipeline.py
          test -f src/data_contracts.py
          test -f scripts/pipeline_scorecard.py
      - name: Workflow sanity marker
        run: python -c "print('healthcare CI syntax checks passed')"
